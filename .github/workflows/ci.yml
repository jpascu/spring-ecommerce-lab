name: CI

# Integracion continua: compila y testea backend y frontend en cada push/PR a main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # 'mvn verify' ejecuta tests unitarios (Surefire) e integracion (Failsafe).
      # Los *IT usan Testcontainers; el runner de GitHub ya trae Docker disponible.
      - name: Build & test
        working-directory: backend
        run: mvn -B verify

      - name: Publicar resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          if-no-files-found: ignore

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker images (build)
    runs-on: ubuntu-latest
    # Solo tras pasar backend y frontend, y unicamente en push a main.
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Verifica que las imagenes se construyen (no se publican en ningun registry).
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: spring-ecommerce-lab-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: spring-ecommerce-lab-frontend:ci
