spring:
  application:
    name: ecommerce-backend
  profiles:
    active: dev

  # Base de datos en memoria H2 para desarrollo
  datasource:
    url: jdbc:h2:mem:shopdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop   # crea el esquema al arrancar y lo borra al parar (solo dev)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Consola web de H2 en http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

  # Cache en memoria con Caffeine: expira a los 5 min, máx. 100 entradas, con estadísticas
  cache:
    type: caffeine
    cache-names: exchangeRates
    caffeine:
      spec: maximumSize=100,expireAfterWrite=5m,recordStats

server:
  port: 8080

# Documentacion OpenAPI / Swagger UI (springdoc)
springdoc:
  swagger-ui:
    path: /swagger-ui.html          # UI interactiva
    operations-sorter: method
  api-docs:
    path: /v3/api-docs              # especificacion JSON

# Actuator: observabilidad (health, info, metricas, prometheus, loggers...)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,beans,mappings
  endpoint:
    health:
      show-details: always         # muestra el detalle de cada HealthIndicator
  info:
    env:
      enabled: true                # permite publicar las propiedades info.* en /actuator/info
  metrics:
    tags:
      application: ${spring.application.name}   # etiqueta comun para todas las metricas

  health:
    circuitbreakers:
      enabled: true                # publica el estado del circuit breaker en /actuator/health

# Seguridad: secreto para firmar/validar el JWT (HS256 requiere >= 32 bytes).
# En produccion se inyecta por variable de entorno / secreto, nunca en el repo.
security:
  jwt:
    secret: ${JWT_SECRET:cambia-este-secreto-de-desarrollo-no-usar-en-produccion-1234}

# Metadatos expuestos en /actuator/info
info:
  app:
    name: spring-ecommerce-lab
    description: Backend de aprendizaje Spring Boot (arquitectura hexagonal)
    phase: "Fase 8 - Docker & CI"

# Resilience4j: tolerancia a fallos del proveedor externo de tipos de cambio
resilience4j:
  retry:
    instances:
      exchangeRate:
        max-attempts: 3            # 1 intento + 2 reintentos
        wait-duration: 100ms
  circuitbreaker:
    instances:
      exchangeRate:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50          # % de fallos que abre el circuito
        wait-duration-in-open-state: 10s    # tiempo abierto antes de probar (half-open)
        permitted-number-of-calls-in-half-open-state: 3
