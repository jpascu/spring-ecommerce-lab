server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de la API al backend (servicio 'backend' del docker-compose).
    # Evita CORS: el navegador solo habla con nginx (mismo origen).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: cualquier ruta desconocida sirve index.html
    # para que el enrutado de Angular funcione al recargar.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
